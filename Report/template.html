<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backtest Report</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2027; --line: #2a313a; --text: #e6e9ef;
    --muted: #8b95a3; --accent: #4ea1ff; --green: #2ecc71; --red: #e74c3c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 12px; }
  #stats-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-group { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
  .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .stat:last-child { border-bottom: none; }
  .stat .label { color: var(--muted); }
  .stat .value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  th, td { padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
  thead th { cursor: pointer; user-select: none; color: var(--muted); font-weight: 600; white-space: nowrap; }
  thead th:hover { color: var(--text); }
  thead th[aria-sort="ascending"]::after { content: " \25B2"; }
  thead th[aria-sort="descending"]::after { content: " \25BC"; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  .footnote { color: var(--muted); font-size: 12px; margin-top: 16px; }
  #price-chart { width: 100%; height: 600px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 28px; }
  #equity-chart { width: 100%; height: 220px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 28px; }
  .chart-head { display: flex; align-items: center; justify-content: space-between; }
  .chart-controls { display: flex; gap: 8px; }
  #symbol-select, #series-type-select { background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 4px 10px; font: inherit; }
  tbody tr { cursor: pointer; }
  tbody tr.active { background: rgba(78,161,255,.15); }
</style>
</head>
<body>
<h1>Backtest Report</h1>
<p class="sub" id="run-subtitle"></p>

<h2>Equity by trade</h2>
<div id="equity-chart"></div>

<section id="stats-panel">
  <div class="stat-group" id="headline-stats"><h2>Performance</h2><div class="stat-body"></div></div>
  <div class="stat-group" id="trade-quality-stats"><h2>Trade quality</h2><div class="stat-body"></div></div>
  <div class="stat-group" id="run-context"><h2>Run context</h2><div class="stat-body"></div></div>
</section>

<div class="chart-head"><h2>Price</h2><div class="chart-controls"><select id="series-type-select"><option value="candles">Candles</option><option value="bars">Bars</option><option value="line">Line</option></select><select id="symbol-select" hidden></select></div></div>
<div id="price-chart"></div>

<h2>Round trips</h2>
<table id="round-trips">
  <thead>
    <tr>
      <th data-key="number" data-type="num">#</th>
      <th data-key="symbol" data-type="str">Symbol</th>
      <th data-key="entryTime" data-type="date">Entry</th>
      <th data-key="exitTime" data-type="date">Exit</th>
      <th data-key="entryPrice" data-type="num">Entry price</th>
      <th data-key="exitPrice" data-type="num">Exit price</th>
      <th data-key="quantity" data-type="num">Qty</th>
      <th data-key="realizedPnL" data-type="num">P&amp;L</th>
      <th data-key="returnPercent" data-type="num">Return %</th>
      <th data-key="timeHeld" data-type="str">Time held</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<p class="footnote">P&amp;L is shown gross of commission and slippage.</p>

<script>__CHART_LIB__</script>
<script id="report-data" type="application/json">__REPORT_DATA__</script>
<script>
(function () {
  "use strict";
  var model = JSON.parse(document.getElementById("report-data").textContent);
  var stats = model.stats || {};
  var run = model.run || {};

  function fmtMoney(v) {
    if (v == null) return "–";
    return (v < 0 ? "-$" : "$") + Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtPct(v) { return v == null ? "–" : (v * 100).toFixed(2) + "%"; }
  function fmtNum(v, d) { return v == null ? "–" : Number(v).toFixed(d == null ? 2 : d); }
  function fmtDate(v) { return v == null ? "–" : new Date(v).toISOString().replace("T", " ").slice(0, 16) + "Z"; }
  function signClass(v) { return v > 0 ? "pos" : v < 0 ? "neg" : ""; }

  // value may carry an explicit css class for P&L colour-coding
  function row(label, value, cls) {
    return '<div class="stat"><span class="label">' + label + '</span>' +
           '<span class="value ' + (cls || "") + '">' + value + '</span></div>';
  }

  function fill(id, html) { document.querySelector("#" + id + " .stat-body").innerHTML = html; }

  fill("headline-stats",
    row("Net profit", fmtMoney(stats.netProfit), signClass(stats.netProfit)) +
    row("Net profit %", fmtPct(stats.netProfitPercent), signClass(stats.netProfitPercent)) +
    row("Final equity", fmtMoney(run.finalEquity)) +
    row("Total return", fmtPct(run.totalReturnPercent), signClass(run.totalReturnPercent)) +
    row("CAGR", fmtPct(stats.cagr), signClass(stats.cagr)) +
    row("Max drawdown", fmtPct(stats.maxDrawdown), stats.maxDrawdown > 0 ? "neg" : "") +
    row("Sharpe", fmtNum(stats.sharpe)));

  fill("trade-quality-stats",
    row("Trades", fmtNum(stats.trades, 0)) +
    row("Win rate", fmtPct(stats.winRate)) +
    row("Profit factor", fmtNum(stats.profitFactor)) +
    row("Expectancy", fmtMoney(stats.expectancy), signClass(stats.expectancy)) +
    row("Avg win", fmtMoney(stats.avgWin), "pos") +
    row("Avg loss", fmtMoney(stats.avgLoss), stats.avgLoss < 0 ? "neg" : "") +
    row("Max consec. losses", fmtNum(stats.maxConsecLosses, 0)));

  var symbols = (run.symbols || []).join(", ");
  fill("run-context",
    row("Symbols", symbols || "–") +
    row("Interval", run.interval || "–") +
    row("From", fmtDate(run.fromUtc)) +
    row("To", fmtDate(run.toUtc)) +
    row("Starting equity", fmtMoney(run.startingEquity)));

  document.getElementById("run-subtitle").textContent =
    symbols + " · " + (run.interval || "") + " · " + fmtDate(run.fromUtc) + " – " + fmtDate(run.toUtc);

  // --- Round-trips table ---
  var trips = (model.roundTrips || []).slice();
  var tbody = document.querySelector("#round-trips tbody");

  function cell(value, cls) { return '<td class="' + (cls || "") + '">' + value + "</td>"; }
  function renderRows() {
    tbody.innerHTML = trips.map(function (t) {
      return '<tr data-number="' + t.number + '">' +
        cell(t.number) + cell(t.symbol) + cell(fmtDate(t.entryTime)) + cell(fmtDate(t.exitTime)) +
        cell(fmtMoney(t.entryPrice)) + cell(fmtMoney(t.exitPrice)) + cell(t.quantity) +
        cell(fmtMoney(t.realizedPnL), signClass(t.realizedPnL)) +
        cell(fmtPct(t.returnPercent), signClass(t.returnPercent)) +
        cell(t.timeHeld) +
        "</tr>";
    }).join("");
  }
  renderRows();

  var headers = document.querySelectorAll("#round-trips thead th");
  var sortKey = null, sortDir = 1;
  headers.forEach(function (th) {
    th.addEventListener("click", function () {
      var key = th.getAttribute("data-key");
      var type = th.getAttribute("data-type");
      sortDir = (sortKey === key) ? -sortDir : 1;
      sortKey = key;
      headers.forEach(function (h) { h.removeAttribute("aria-sort"); });
      th.setAttribute("aria-sort", sortDir === 1 ? "ascending" : "descending");
      trips.sort(function (a, b) {
        var av = a[key], bv = b[key];
        if (type === "num") { av = Number(av); bv = Number(bv); }
        else if (type === "date") { av = new Date(av).getTime(); bv = new Date(bv).getTime(); }
        else { av = String(av); bv = String(bv); }
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });
      renderRows();
    });
  });

  // --- Price chart ---
  // All chart values are pre-derived in the model: candles, markers, indicators, and the equity curve
  // already carry UTC-seconds timestamps; markers carry placement, colour, label, and the round-trip
  // number linking them to a table row. Every pane lives on one chart, so they share one time axis.
  var chartData = model.chart || {};
  var allSeries = chartData.series || {};
  var allMarkers = chartData.markers || [];
  var equityCurve = model.equityCurve || [];
  var indicatorPalette = ["#4ea1ff", "#f5a623", "#bd10e0", "#7ed321", "#50e3c2", "#e94f8a"];

  // The symbols that actually have candle data, in run order.
  var runSymbols = (run.symbols && run.symbols.length) ? run.symbols : Object.keys(allSeries);
  var symbols = runSymbols.filter(function (s) { return allSeries[s] && allSeries[s].length; });

  var chartEl = document.getElementById("price-chart");
  var selectEl = document.getElementById("symbol-select");
  var typeEl = document.getElementById("series-type-select");
  var chart = null, selected = null, seriesType = "candles", applyPaneHeights = function () {};

  function toSec(iso) { return Math.floor(new Date(iso).getTime() / 1000); }

  // Toggle the .active highlight on the round-trip row matching the given number (null clears all).
  function highlightRow(number) {
    tbody.querySelectorAll("tr").forEach(function (r) {
      r.classList.toggle("active", number != null && Number(r.getAttribute("data-number")) === number);
    });
  }

  // Build the price series for the current chart type and attach it to the price pane, returning it so
  // markers and pane sizing can hook onto it. Candles render hollow on up bars / filled on down bars:
  // Lightweight Charts has no hollow mode, so up bodies take the pane background and only the green
  // border and wick show. Bars are native OHLC; line tracks the close price.
  function addPriceSeries(candles, pricePane) {
    if (seriesType === "line") {
      var lineSeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: "#4ea1ff", lineWidth: 2, priceLineVisible: false, lastValueVisible: true
      }, pricePane);
      lineSeries.setData(candles.map(function (candle) { return { time: candle.time, value: candle.close }; }));
      return lineSeries;
    }
    if (seriesType === "bars") {
      var barSeries = chart.addSeries(LightweightCharts.BarSeries, {
        upColor: "#2ecc71", downColor: "#e74c3c", thinBars: false
      }, pricePane);
      barSeries.setData(candles);
      return barSeries;
    }
    var candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: "#1a2027", downColor: "#e74c3c",
      borderUpColor: "#2ecc71", borderDownColor: "#e74c3c",
      wickUpColor: "#2ecc71", wickDownColor: "#e74c3c",
      borderVisible: true
    }, pricePane);
    candleSeries.setData(candles);
    return candleSeries;
  }

  // (Re)build the price chart for the selected symbol. The price pane (pane 0) holds candles, markers,
  // and price-overlay indicators and is the tallest; each separate-pane indicator gets its own short
  // sub-pane beneath. The equity curve is a separate chart (see buildEquityChart). Rebuilding on a
  // symbol switch keeps the code path identical for every symbol.
  function buildChart(symbol) {
    selected = symbol;
    if (chart) { chart.remove(); chart = null; }
    chart = LightweightCharts.createChart(chartEl, {
      width: chartEl.clientWidth, height: chartEl.clientHeight,
      layout: {
        background: { color: "#1a2027" }, textColor: "#e6e9ef",
        // Thin separator between price and indicator panes; resize stays enabled so the divider can be
        // dragged. The hover handle uses a muted blue (less glaring than the bright accent) to signal
        // it is draggable without dominating. Its thickness is fixed by the library, not settable.
        panes: { separatorColor: "#3d4756", separatorHoverColor: "#5a86b3", enableResize: true }
      },
      grid: { vertLines: { color: "#2a313a" }, horzLines: { color: "#2a313a" } },
      timeScale: { timeVisible: true, secondsVisible: false, borderColor: "#2a313a" },
      rightPriceScale: { borderColor: "#2a313a" }
    });

    var pricePane = 0;
    var candleSeries = addPriceSeries(allSeries[symbol], pricePane);

    // Only the selected symbol's markers, in ascending time order. Each marker's id is its round-trip
    // number so a hover can highlight the matching table row.
    var markers = allMarkers
      .filter(function (m) { return m.symbol === symbol; })
      .map(function (m) { return { time: m.time, position: m.position, shape: m.shape, color: m.color, text: m.text, id: m.roundTripNumber }; })
      .sort(function (a, b) { return a.time - b.time; });
    LightweightCharts.createSeriesMarkers(candleSeries, markers);

    // Indicators for this symbol only (an untagged series applies to every symbol). Price overlays
    // share the price pane; separate-pane series each get their own sub-pane beneath it.
    var separateSeries = [];
    var nextPane = pricePane + 1;
    (model.indicators || [])
      .filter(function (ind) { return !ind.symbol || ind.symbol === symbol; })
      .forEach(function (ind, idx) {
        var points = (ind.points || []).slice().sort(function (a, b) { return a.time - b.time; });
        if (!points.length) return;
        var separate = ind.pane === "separatePane";
        var color = indicatorPalette[idx % indicatorPalette.length];
        var line;
        if (separate) {
          // Fill each indicator pane with a translucent area so it reads as a distinct block,
          // visually set apart from the clean line-only price pane.
          line = chart.addSeries(LightweightCharts.AreaSeries, {
            lineColor: color, topColor: color + "55", bottomColor: color + "0a",
            lineWidth: 2, priceLineVisible: false, lastValueVisible: true, title: ind.name
          }, nextPane++);
        } else {
          line = chart.addSeries(LightweightCharts.LineSeries, {
            color: color, lineWidth: 2, priceLineVisible: false, lastValueVisible: false, title: ind.name
          }, pricePane);
        }
        line.setData(points);
        if (separate) { separateSeries.push(line); }
      });

    // Size the panes by relative stretch factor rather than absolute height: setHeight on multiple
    // panes in one frame fights over a shared height budget (lightweight-charts #1847) and only one
    // pane ends up resized. Stretch factors are order-independent. The price pane (the main pane) is
    // the tallest; each indicator sub-pane is half its height, giving a 6:1:1 split of the chart.
    // Applied on the next frame (after layout) and re-applied on resize, reached via the series.
    applyPaneHeights = function () {
      requestAnimationFrame(function () {
        candleSeries.getPane().setStretchFactor(6);
        separateSeries.forEach(function (series) { series.getPane().setStretchFactor(1); });
      });
    };
    applyPaneHeights();

    // Hover a marker -> highlight its row; moving off any marker clears the highlight.
    chart.subscribeCrosshairMove(function (param) {
      highlightRow(param && param.hoveredObjectId != null ? Number(param.hoveredObjectId) : null);
    });

    chart.timeScale().fitContent();
  }

  // Build the portfolio-wide equity curve as its own chart, indexed by trade count (not time): point
  // zero is the starting equity and each step adds a closed trade's realized P&L. A synthetic per-trade
  // time spaces the points evenly; the axis and crosshair show the trade number, not a date.
  function buildEquityChart() {
    var equityEl = document.getElementById("equity-chart");
    if (!equityEl || !equityCurve.length) return;

    var ONE_DAY = 86400; // one synthetic "day" per trade so the time scale spaces points evenly
    function tradeOf(time) { return Math.round(time / ONE_DAY) - 1; }

    var equityChart = LightweightCharts.createChart(equityEl, {
      width: equityEl.clientWidth, height: equityEl.clientHeight,
      // The equity curve is a static overview, so disable all pan/zoom interaction.
      handleScroll: false, handleScale: false,
      layout: { background: { color: "#1a2027" }, textColor: "#e6e9ef" },
      grid: { vertLines: { color: "#2a313a" }, horzLines: { color: "#2a313a" } },
      rightPriceScale: { borderColor: "#2a313a" },
      timeScale: {
        borderColor: "#2a313a",
        tickMarkFormatter: function (time) { return "#" + tradeOf(time); }
      },
      localization: { timeFormatter: function (time) { return "Trade " + tradeOf(time); } }
    });
    var equitySeries = equityChart.addSeries(LightweightCharts.LineSeries, {
      color: "#4ea1ff", lineWidth: 2, priceLineVisible: false, lastValueVisible: true, title: "Equity"
    });
    equitySeries.setData(equityCurve.map(function (p) { return { time: (p.trade + 1) * ONE_DAY, value: p.equity }; }));
    equityChart.timeScale().fitContent();

    window.addEventListener("resize", function () {
      equityChart.resize(equityEl.clientWidth, equityEl.clientHeight);
    });
  }

  // Focus a round trip: switch symbol if needed, frame its entry..exit span, and highlight its row.
  function focusTrip(trip) {
    if (!chart) return;
    if (trip.symbol !== selected && allSeries[trip.symbol] && allSeries[trip.symbol].length) {
      if (selectEl) selectEl.value = trip.symbol;
      buildChart(trip.symbol);
    }
    var from = toSec(trip.entryTime), to = toSec(trip.exitTime);
    var pad = Math.max(3600, (to - from) * 0.5); // breathing room around the trade
    chart.timeScale().setVisibleRange({ from: from - pad, to: to + pad });
    highlightRow(trip.number);
  }

  if (chartEl && window.LightweightCharts && symbols.length) {
    // The selector switches the displayed symbol's chart; it is hidden for a single-symbol run.
    if (selectEl && symbols.length > 1) {
      selectEl.innerHTML = symbols.map(function (s) { return '<option value="' + s + '">' + s + "</option>"; }).join("");
      selectEl.hidden = false;
      selectEl.addEventListener("change", function () { buildChart(selectEl.value); });
    }

    // Switch the price series type (candles / bars / line) and rebuild the current symbol in place.
    if (typeEl) {
      typeEl.value = seriesType;
      typeEl.addEventListener("change", function () {
        seriesType = typeEl.value;
        buildChart(selected || symbols[0]);
      });
    }

    buildChart(symbols[0]);

    // The chart is explicitly sized, so keep it in step with the container and re-apply pane heights.
    window.addEventListener("resize", function () {
      if (!chart) return;
      chart.resize(chartEl.clientWidth, chartEl.clientHeight);
      applyPaneHeights();
    });

    // Click a round-trip row to focus that trade on the chart (switching symbol if needed).
    tbody.addEventListener("click", function (event) {
      var tr = event.target.closest("tr");
      if (!tr) return;
      var number = Number(tr.getAttribute("data-number"));
      var trip = trips.filter(function (t) { return t.number === number; })[0];
      if (trip) focusTrip(trip);
    });
  }

  if (window.LightweightCharts) { buildEquityChart(); }
})();
</script>
</body>
</html>
